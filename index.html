<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap & Earn</title>

<style>
body {
  background: #121212;
  color: white;
  text-align: center;
  font-family: Arial;
}

h1 {
  color: gold;
}

.coin {
  width: 150px;
  height: 150px;
  background: url('https://cryptologos.cc/logos/tether-usdt-logo.png') no-repeat center/cover;
  margin: 50px auto;
  border-radius: 50%;
  cursor: pointer;
}

.score {
  font-size: 40px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>💰 Tap & Earn</h1>

<div class="score" id="score">0</div>

<div class="coin" id="coin"></div>

<p>Tap the coin</p>

<script>
let score = 0;

const coin = document.getElementById("coin");
const scoreText = document.getElementById("score");

coin.addEventListener("click", function () {
  score++;
  scoreText.innerText = score;
});
</script>

</body>
</html>

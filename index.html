<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Test</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
}

#coin {
  width: 150px;
  height: 150px;
  background: yellow;
  margin: 50px auto;
}
</style>
</head>

<body>

<h1 id="score">0</h1>

<div id="coin"></div>

<script>
let score = 0;

document.getElementById("coin").onclick = function() {
  score++;
  document.getElementById("score").innerText = score;
};
</script>

</body>
</html>
